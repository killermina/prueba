name: Actualizar desde prueba6.json

on:
  schedule:
    # 01:05 PM PY = 17:05 UTC | 09:05 PM PY = 01:05 UTC (del día siguiente)
    - cron: '5 17,1 * * *'
  workflow_dispatch:              # para probar manual

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar dependencias necesarias
        run: pip install requests

      - name: Actualizar solo url y drm_license_uri
        id: run_script
        run: |
          # Ejecutamos el script y guardamos todo lo que imprima en un archivo
          python update_from_prueba6.py > log_telegram.txt
          # También lo mostramos en la consola de GitHub por si acaso
          cat log_telegram.txt

      - name: Commit automático si hubo cambios
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Actualización automática: urls y drm_license_uri desde prueba6.json"
          file_pattern: comunJakare.json
          branch: main
          skip_dirty_check: false
          skip_fetch: false

      - name: Notificar por Telegram
        if: always() # Para que te avise incluso si el script falla
        run: |
          # Leemos el log que generó el script de Python
          REPORT=$(cat log_telegram.txt)
          
          # Enviamos a Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🚀 *Nitro Play+ Update* %0A%0A$REPORT" \
            -d "parse_mode=Markdown"
