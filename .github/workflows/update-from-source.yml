name: Actualizar desde prueba6.json

on:
  schedule:
    - cron: '0 10 * * *'          # diario ~07:00 Paraguay
  workflow_dispatch:              # para probar manual

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar dependencias necesarias
        run: pip install requests

      - name: Actualizar solo url y drm_license_uri
        run: python update_from_prueba6.py

      - name: Commit automático si hubo cambios
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Actualización automática: urls y drm_license_uri desde prueba6.json"
          file_pattern: comunJakare.json
          branch: main
          skip_dirty_check: false
          skip_fetch: false
